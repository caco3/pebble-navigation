name: Android Build

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Rename APK
        run: |
          cd android
          TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || true)
          if [ -n "$TAG" ]; then
            NAME="PebbleNavigation-${TAG}.apk"
          else
            NAME="PebbleNavigation.apk"
          fi
          mv app/build/outputs/apk/release/*.apk "app/build/outputs/apk/release/${NAME}"
          echo "APK_NAME=${NAME}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PebbleNavigation
          path: android/app/build/outputs/apk/release/${{ env.APK_NAME }}
          retention-days: 14

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/${{ env.APK_NAME }}
