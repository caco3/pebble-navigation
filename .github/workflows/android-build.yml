name: Android Build

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Android app
      run: |
        cd android
        ./gradlew build

    - name: Run unit tests
      run: |
        cd android
        ./gradlew test

    - name: Build debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Build release APK
      if: github.ref == 'refs/heads/main'
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Sign release APK
      if: github.ref == 'refs/heads/main' && secrets.SIGNING_KEY != ''
      run: |
        cd android
        # Decode keystore
        echo "${{ secrets.SIGNING_KEY }}" | base64 -d > app/keystore.jks
        
        # Find the build tools directory
        BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
        
        # Rename unsigned APK for processing
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/app-release-unsigned.apk
        
        # Align the APK
        $BUILD_TOOLS_DIR/zipalign -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release-aligned.apk
        
        # Sign the APK
        $BUILD_TOOLS_DIR/apksigner sign --ks app/keystore.jks \
          --ks-key-alias "${{ secrets.SIGNING_KEY_ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out app/build/outputs/apk/release/app-release.apk \
          app/build/outputs/apk/release/app-release-aligned.apk
        
        # Clean up
        rm app/keystore.jks
        rm app/build/outputs/apk/release/app-release-unsigned.apk
        rm app/build/outputs/apk/release/app-release-aligned.apk

    - name: Upload release APK
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: android/app/build/outputs/apk/release/app-release.apk
